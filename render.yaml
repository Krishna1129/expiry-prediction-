services:
  - type: web
    name: fruit-veg-expiry
    env: python
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: GUNICORN_CMD_ARGS
        value: --timeout 180 --workers 1 --threads 2
      - key: TF_CPP_MIN_LOG_LEVEL
        value: "2"
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --timeout 120
    autoDeploy: true
