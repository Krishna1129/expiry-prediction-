<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Produce Expiry Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <main class="page">
        <section class="card">
            <h1>Produce Recognition + Expiry Prediction</h1>
            <p class="subtitle">Upload an image and provide storage conditions to estimate shelf life.</p>

            <form method="post" enctype="multipart/form-data" class="form-grid">
                <label>
                    Image
                    <input type="file" name="image" accept=".jpg,.jpeg,.png" required>
                </label>

                <label>
                    Average Temperature (C)
                    <input type="number" name="avg_temp_c" step="0.1" min="-10" max="60" value="25" required>
                </label>

                <label>
                    Humidity (%)
                    <input type="number" name="humidity_pct" step="0.1" min="0" max="100" value="60" required>
                </label>

                <label>
                    Storage Type
                    <select name="storage_type" required>
                        {% for value in storage_types %}
                        <option value="{{ value }}">{{ value }}</option>
                        {% endfor %}
                    </select>
                </label>

                <label>
                    Location
                    <select name="location" required>
                        {% for value in locations %}
                        <option value="{{ value }}">{{ value }}</option>
                        {% endfor %}
                    </select>
                </label>

                <label>
                    Season
                    <select name="season" required>
                        {% for value in seasons %}
                        <option value="{{ value }}">{{ value }}</option>
                        {% endfor %}
                    </select>
                </label>

                <button type="submit">Predict</button>
            </form>

            {% if error %}
            <div class="alert error">{{ error }}</div>
            {% endif %}

            {% if result %}
            <div class="result">
                <h2>Result</h2>
                <p><strong>Item Name:</strong> {{ result.item_name }}</p>
                <p><strong>Item Type:</strong> {{ result.item_type }}</p>
                <p><strong>Expiry Days:</strong> {{ result.expiry_days }}</p>
            </div>
            {% endif %}
        </section>
    </main>
</body>
</html>
